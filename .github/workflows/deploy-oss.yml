# GitHub 推送后自动构建并部署到阿里云 OSS 静态托管
name: Deploy to Aliyun OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_VIDEO_BASE_URL: ${{ secrets.NEXT_PUBLIC_VIDEO_BASE_URL }}
        run: npm run build

      - name: Configure ossutil
        run: |
          wget -q http://gosspublic.alicdn.com/ossutil/1.7.15/ossutil64 -O ossutil64
          chmod +x ossutil64
          ./ossutil64 config -e ${{ secrets.OSS_REGION }}.aliyuncs.com \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        run: |
          ./ossutil64 cp -r -f out/ oss://${{ secrets.OSS_BUCKET }}/
